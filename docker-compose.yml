version: '3.8'

services:
  web:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: ritishfx-website
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      # Map the entire prisma directory to prevent bind mount breakage during SQLite schema updates
      - ./prisma:/app/prisma

  caddy:
    image: caddy:2-alpine
    container_name: caddy-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
